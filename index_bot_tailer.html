<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: var(--tg-theme-bg-color, #fff); color: var(--tg-theme-text-color, #000); padding: 20px; text-align: center; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; }
        button { background: var(--tg-theme-button-color, #3390ec); color: var(--tg-theme-button-text-color, #fff); border: none; padding: 12px 24px; border-radius: 8px; font-size: 16px; width: 100%; cursor: pointer; margin: 5px 0; }
    </style>
</head>
<body>
    <h2>🛡️ Панель</h2>
    <input type="number" id="cid" placeholder="ID чата (-100...)">
    <button onclick="send('settings')">⚙️ Настройки</button>
    <button onclick="send('bans')">📋 Баны</button>
    <button onclick="send('combo')">🔗 Комбо</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        
        function send(action) {
            const cid = document.getElementById('cid').value;
            if(!cid) return tg.showAlert("Введи ID чата!");
            // Отправляем данные боту
            tg.sendData(action + "|" + cid);
            tg.close();
        }
    </script>
</body>
</html>
